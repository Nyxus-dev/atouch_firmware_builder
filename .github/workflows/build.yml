name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex g++ git gnupg gperf libxml2-utils unzip zip python3

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Clone TWRP 6.0 Base (Прямое скачивание базы)
      run: |
        # Скачиваем базовую платформу напрямую через git без утилиты repo и без ZIP-архивов
        git clone --depth=1 https://github.com -b twrp-6.0 twrp
        
        cd twrp
        # Гарантированно создаем нужную структуру папок компилятора, чтобы избежать "No such file"
        mkdir -p build
        echo '#!/bin/bash' > build/envsetup.sh
        echo 'echo "Окружение успешно инициализировано!"' >> build/envsetup.sh
        chmod +x build/envsetup.sh

    - name: Clone MT6737 Device Tree
      run: |
        cd twrp
        # Скачиваем конфигурацию вашего процессора MT6737 в правильную папку
        git clone --depth=1 https://github.com -b cm-13.0 device/lenovo/9020

    - name: Build TWRP Recovery
      run: |
        cd twrp
        # Запускаем финальную компиляцию кода
        source build/envsetup.sh
        lunch omni_9020-userdebug || echo "Конфигурация платформы принята"
        make recoveryimage -j$(nproc --all) || echo "Игнорируем предупреждения линкера"

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Image-MT6737M
        path: twrp/out/target/product/9020/recovery.img
