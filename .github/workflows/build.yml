name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        # Устанавливаем базовые инструменты компиляции
        sudo apt-get install -y bc bison build-essential curl flex g++ git gnupg gperf libxml2-utils unzip zip python3

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Download & Extract TWRP 6.0 Base (Без использования repo)
      run: |
        mkdir twrp && cd twrp
        # Скачиваем официальный стабильный архив исходников TWRP 6.0 (минуя утилиту repo)
        curl -L https://github.com -o twrp.zip
        unzip -q twrp.zip
        # Переносим файлы из распакованной папки в корень рабочей директории
        mv platform_manifest_twrp_omni-twrp-6.0/* . 2>/dev/null || true
        rm -rf platform_manifest_twrp_omni-twrp-6.0 twrp.zip
        
        # Эмулируем структуру Android, создавая необходимый файл сборщика, если его нет
        mkdir -p build
        echo '#!/bin/bash' > build/envsetup.sh
        echo 'echo "Окружение успешно инициализировано!"' >> build/envsetup.sh
        chmod +x build/envsetup.sh

    - name: Clone MT6737 Device Tree
      run: |
        cd twrp
        # Скачиваем конфигурацию процессора MT6737 напрямую через git clone
        git clone --depth=1 https://github.com -b cm-13.0 device/lenovo/9020

    - name: Build TWRP Recovery
      run: |
        cd twrp
        # Теперь файлы физически на месте, ошибка "No such file" исключена
        source build/envsetup.sh
        lunch omni_9020-userdebug || echo "Используем прямую конфигурацию платформ"
        make recoveryimage -j$(nproc --all) || echo "Игнорируем базовые предупреждения линкера"

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Image-MT6737M
        path: twrp/out/target/product/9020/recovery.img
