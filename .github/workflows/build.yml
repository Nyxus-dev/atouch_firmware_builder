name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Compilation Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 repo

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Initialize Minimal OmniROM Source
      run: |
        mkdir twrp && cd twrp
        # Инициализируем исходники для сборки под Android 6.0 (на базе которого работает планшет)
        repo init --depth=1 -u https://github.com -b twrp-6.0
        echo "Исходный код репозитория успешно подготовлен под архитектуру MT6737M!"
