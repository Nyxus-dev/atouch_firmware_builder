name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Pure Base Tools
      run: |
        sudo apt-get update
        # Оставляем только базовые пакеты, которые ТОЧНО не вызовут ошибку 100
        sudo apt-get install -y bc bison build-essential curl flex g++ git gnupg gperf libxml2-utils unzip zip python3

    - name: Install Google Repo Tool Manually
      run: |
        # Скачиваем утилиту repo напрямую с серверов Google в обход apt-get
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/usr/bin/repo || sudo ln -sf ~/bin/repo /usr/local/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Initialize Minimal OmniROM Source
      run: |
        mkdir twrp && cd twrp
        # Инициализируем чистый исходник TWRP
        ~/bin/repo init --depth=1 -u https://github.com -b twrp-6.0
        echo "Исходный код успешно подготовлен без системных ошибок!"
