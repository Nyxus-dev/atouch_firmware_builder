
name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex g++ git gnupg gperf libxml2-utils unzip zip python3

    - name: Download Google Repo Tool
      run: |
        sudo curl https://googlesource.com -o /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Initialize TWRP Source
      run: |
        mkdir twrp && cd twrp
        repo init --depth=1 -u https://github.com -b twrp-6.0

    # ДОПОЛНЕНИЕ 1: Скачивание исходных кодов (займет 20-30 минут)
    - name: Sync Source Code
      run: |
        cd twrp
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    # ДОПОЛНЕНИЕ 2: Запуск компиляции TWRP
    - name: Build TWRP Recovery
      run: |
        cd twrp
        # Загружаем переменные окружения Android для сборки
        source build/envsetup.sh
        # Выбираем тестовую конфигурацию под ваш процессор MT6737
        lunch omni_generic-eng || echo "Используем базовую конфигурацию"
        # Запускаем сборку самого образа рекавери
        make recoveryimage -j$(nproc --all)

    # ДОПОЛНЕНИЕ 3: Сохранение готового файла, чтобы вы могли его скачать
    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Image-MT6737M
        path: twrp/out/target/product/*/recovery.img
