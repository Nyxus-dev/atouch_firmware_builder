name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential curl flex g++ git gnupg gperf libxml2-utils unzip zip python3 python3-pip

    - name: Download Google Repo Tool
      run: |
        sudo curl https://googlesource.com -o /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Initialize & Sync TWRP Source
      run: |
        mkdir twrp && cd twrp
        # 1. Настраиваем базу TWRP
        python3 /usr/local/bin/repo init --depth=1 -u https://github.com -b twrp-6.0
        
        # 2. Безопасно добавляем дерево MT6737 в локальный манифест, чтобы избежать ошибок git clone
        mkdir -p .repo/local_manifests
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="lopestom/android_device_lenovo_9020" path="device/lenovo/9020" remote="github" revision="cm-13.0" />
        </manifest>' > .repo/local_manifests/mt6737.xml
        
        # 3. Запускаем общее скачивание (база + дерево скачаются одновременно за 15-25 минут)
        python3 /usr/local/bin/repo sync -c -j4 --force-sync --no-clone-bundle --no-tags

    - name: Build TWRP Recovery
      run: |
        cd twrp
        # Запускаем компиляцию — теперь все файлы гарантированно на месте
        source build/envsetup.sh
        lunch omni_9020-userdebug
        make recoveryimage -j$(nproc --all)

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Image-MT6737M
        path: twrp/out/target/product/9020/recovery.img
