name: MT6737M TWRP Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # Стабильный сервер GitHub

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        # Устанавливаем базовые инструменты для сборки Android/TWRP
        sudo apt-get install -y bc bison build-essential curl flex g++ git gnupg gperf libxml2-utils unzip zip python3

    - name: Download Google Repo Tool
      run: |
        # Скачиваем официальную утилиту repo в системную директорию
        sudo curl https://googleapis.com -o /usr/local/bin/repo
        sudo chmod a+x /usr/local/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "Nyxus-dev"
        git config --global user.email "nyxus@example.com"

    - name: Initialize TWRP Source
      run: |
        mkdir twrp && cd twrp
        # Инициализируем исходники манифеста TWRP 6.0
        repo init --depth=1 -u https://github.com -b twrp-6.0
        echo "Исходники манифеста успешно настроены!"
